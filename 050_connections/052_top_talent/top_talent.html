<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Talent DB</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #ffffff;
      --surface: #f4f4f4;
      --card:    #f0f0f0;
      --border:  #d8d8d8;
      --text:    #111111;
      --muted:   #888888;
      --accent:  #111111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      font-size: 14px;
      line-height: 1.7;
    }
    .page { max-width: 1040px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── HERO ── */
    .hero {
      display: flex; align-items: center; gap: 28px;
      padding: 28px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 28px;
    }
    .hero-icon {
      width: 64px; height: 64px; border-radius: 14px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0; color: #fff;
    }
    .hero-text h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: -0.3px;
    }
    .hero-text .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; }
    .hero-meta span { font-size: 12px; color: var(--muted); }
    .hero-meta span b { color: var(--text); font-weight: 600; }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--muted);
      font-size: 12px; font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .7px;
      margin: 36px 0 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .sec-label .count {
      font-size: 11px; color: var(--muted); font-weight: 400;
    }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── TALENT CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color .15s;
    }
    .card:hover { border-color: #aaa; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .card-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .card-name .en { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); display: block; margin-top: 1px; }
    .card-industry-badge {
      font-size: 10px; font-weight: 700; color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-row {
      display: flex; gap: 6px; align-items: flex-start;
      margin-bottom: 5px;
      font-size: 12.5px;
    }
    .card-row .label {
      color: var(--muted); font-weight: 600;
      min-width: 50px; flex-shrink: 0;
    }
    .card-row .val { color: var(--text); }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .tag {
      font-size: 11px; padding: 2px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text);
    }

    .card-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 10px;
      line-height: 1.6;
    }

    /* ── SEARCH ── */
    .search-wrap {
      margin-bottom: 20px;
    }
    .search-input {
      width: 100%;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* ── STATS ── */
    .stats-bar {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .stat { text-align: center; }
    .stat .num { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 700; }
    .stat .lbl { font-size: 11px; color: var(--muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">

  <!-- HERO -->

    <div class="hero-icon">★</div>
    <div class="hero-text">
      <h1>Top Talent DB</h1>

      <div class="hero-meta">

        <span>Source: <b>top_talent.md</b></span>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><div class="num" id="total-count">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="num" id="industry-count">0</div><div class="lbl">Industries</div></div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="名前・所属・得意分野で検索..." id="search-input">
  </div>

  <!-- FILTER -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-industry="all">すべて</button>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

</div>

    industry: "政財界 / 官僚",
    note: "自民党内の改革派。規制改革・行政改革で独自路線。"
  },
];

// Build industry list
const industries = ["all", ...new Set(talents.map(t => t.industry))];

// Stats
document.getElementById("total-count").textContent = talents.length;
document.getElementById("industry-count").textContent = industries.length - 1;

// Build filter buttons
const filterBar = document.getElementById("filter-bar");
industries.slice(1).forEach(ind => {
  const btn = document.createElement("button");
  btn.className = "filter-btn";
  btn.dataset.industry = ind;
  btn.textContent = ind;
  filterBar.appendChild(btn);
});

let currentIndustry = "all";
let currentSearch = "";

function buildContent() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  const filtered = talents.filter(t => {
    const matchInd = currentIndustry === "all" || t.industry === currentIndustry;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || [t.name, t.nameEn, t.affiliation, t.education, ...t.expertise, t.note].some(s => s && s.toLowerCase().includes(q));
    return matchInd && matchSearch;
  });

  if (filtered.length === 0) {
    content.innerHTML = '<div style="color:var(--muted);text-align:center;padding:60px 0;font-size:13px;">該当する人材が見つかりません</div>';
    return;
  }

  // Group by industry
  const grouped = {};
  filtered.forEach(t => {
    if (!grouped[t.industry]) grouped[t.industry] = [];
    grouped[t.industry].push(t);
  });

  Object.entries(grouped).forEach(([ind, people]) => {
    const label = document.createElement("div");
    label.className = "sec-label";
    label.innerHTML = `${ind} <span class="count">${people.length}人</span>`;
    content.appendChild(label);

    const grid = document.createElement("div");
    grid.className = "cards-grid";

    people.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <div class="card-name">
            ${p.name}
            <span class="en">${p.nameEn}</span>
          </div>
          <div class="card-industry-badge">${p.industry}</div>
        </div>
        ${p.born !== "—" ? `<div class="card-row"><span class="label">年齢</span><span class="val">${p.born}</span></div>` : ""}
        <div class="card-row"><span class="label">所属</span><span class="val">${p.affiliation}</span></div>
        ${p.education !== "—" ? `<div class="card-row"><span class="label">学歴</span><span class="val">${p.education}</span></div>` : ""}
        <div class="tags">${p.expertise.map(e => `<span class="tag">${e}</span>`).join("")}</div>
        ${p.note ? `<div class="card-note">${p.note}</div>` : ""}
      `;
      grid.appendChild(card);
    });

    content.appendChild(grid);
  });
}

// Filter click
filterBar.addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  filterBar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentIndustry = btn.dataset.industry;
  buildContent();
});

// Search
document.getElementById("search-input").addEventListener("input", e => {
  currentSearch = e.target.value;
  buildContent();
});

buildContent();
</script>

</html>
